# Docker Compose for local development - Only infrastructure services
# Use this when you want to run microservices from IDE but need PostgreSQL

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: rental-postgres
    environment:
      POSTGRES_USER: nam
      POSTGRES_PASSWORD: nam123
      POSTGRES_MULTIPLE_DATABASES: rental_auth,rental_account,rental_item,rental_statistic,rental_payment,rental_curriculum,rental_lesson
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-multiple-databases.sh:/docker-entrypoint-initdb.d/init-multiple-databases.sh
    ports:
      - "5432:5432"
    networks:
      - rental-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nam"]
      interval: 10s
      timeout: 5s
      retries: 5

  # pgAdmin - PostgreSQL Web UI (optional)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: rental-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@rental.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    networks:
      - rental-network
    depends_on:
      - postgres

  # Redis Cache (for curriculum-service and lesson-service)
  redis:
    image: redis:7-alpine
    container_name: rental-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - rental-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  rental-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
