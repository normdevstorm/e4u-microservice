# ===========================================
# Common settings for all environments
# ===========================================
server:
  port: 9000
  servlet:
    context-path: /

spring:
  boot:
    admin:
      context-path: /admin
      ui:
        title: Rental Microservices Monitor
      notify:
        mail:
          enabled: ${ADMIN_MAIL_ENABLED:false}
          to: ${ADMIN_MAIL_TO:}
  mail:
    default-encoding: UTF-8
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    protocol: smtp
    test-connection: false
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# Eureka client
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:9999/eureka}
  instance:
    prefer-ip-address: true
    metadata-map:
      startup: ${random.int}

# Actuator endpoints - expose all for admin monitoring
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    root: info
    de.codecentric.boot.admin: info

---
# ===========================================
# Development profile
# ===========================================
spring:
  config:
    activate:
      on-profile: dev

---
# ===========================================
# Docker profile
# ===========================================
spring:
  config:
    activate:
      on-profile: docker

eureka:
  client:
    service-url:
      defaultZone: http://discovery-service:9999/eureka

---
# ===========================================
# Production profile
# ===========================================
spring:
  config:
    activate:
      on-profile: prod
  boot:
    admin:
      notify:
        mail:
          enabled: true

logging:
  level:
    root: warn
