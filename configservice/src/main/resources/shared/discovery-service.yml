# ===========================================
# Common settings for all environments
# ===========================================
server:
  port: 9999

eureka:
  instance:
    hostname: ${EUREKA_HOSTNAME:localhost}
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    root: info
    com.netflix.eureka: info
    com.netflix.discovery: info

---
# ===========================================
# Development profile
# ===========================================
spring:
  config:
    activate:
      on-profile: dev

---
# ===========================================
# Docker profile
# ===========================================
spring:
  config:
    activate:
      on-profile: docker

eureka:
  instance:
    hostname: discovery-service

---
# ===========================================
# Production profile
# ===========================================
spring:
  config:
    activate:
      on-profile: prod

logging:
  level:
    root: warn
