# ===========================================
# Common settings for all environments
# ===========================================
server:
  port: 8083

spring:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# Feign client configuration
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000
        loggerLevel: basic

# Eureka client
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:9999/eureka}
  instance:
    prefer-ip-address: true

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    root: info
    org.springframework: info
    org.hibernate.SQL: info

# API server URL for Swagger
api:
  server:
    url: ${API_SERVER_URL:http://localhost:8080/item}

# Swagger/OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

---
# ===========================================
# Development profile
# ===========================================
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:rental_item}
    username: ${DB_USERNAME:nam}
    password: ${DB_PASSWORD:nam123}
  jpa:
    show-sql: true

logging:
  level:
    org.hibernate.SQL: debug

---
# ===========================================
# Docker profile
# ===========================================
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://postgres:5432/rental_item
    username: ${DB_USERNAME:nam}
    password: ${DB_PASSWORD:nam123}

eureka:
  client:
    service-url:
      defaultZone: http://discovery-service:9999/eureka

api:
  server:
    url: http://gateway-service:8080/item

---
# ===========================================
# Production profile
# ===========================================
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

logging:
  level:
    root: warn
