# ===========================================
# Common settings for all environments
# ===========================================
server:
  port: 8086
  # servlet:
  #   context-path: /api

spring:
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  cloud:
    openfeign:
      client:
        config:
          default:
            connect-timeout: 5000
            read-timeout: 5000
          curriculum-service:
            connect-timeout: 5000
            read-timeout: 10000
      circuitbreaker:
        enabled: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 6000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
    default-schema: public
    drop-first: false

# Eureka client
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:9999/eureka}
  instance:
    prefer-ip-address: true

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    root: info
    org.springframework: info
    org.hibernate.SQL: info
    com.e4u.lesson_service: info
    # Feign debugging
    org.springframework.cloud.openfeign: debug
    feign: debug

# API server URL for Swagger
api:
  server:
    url: ${API_SERVER_URL:http://localhost:8080/lesson}

# Swagger/OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
    doc-expansion: none
  show-actuator: false

# Application Logging Configuration
app:
  logging:
    enabled: true
    log-request-body: true
    log-response-body: true
    max-request-body-length: 1000
    max-response-body-length: 2000
    slow-request-threshold-ms: 3000
    excluded-uri-patterns:
      - /actuator/**
      - /health
      - /ready
      - /live
      - /v3/api-docs/**
      - /swagger-ui/**

---
# ===========================================
# Development profile
# ===========================================
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:e4u_lesson}
    username: ${DB_USERNAME:nam}
    password: ${DB_PASSWORD:nam123}
  jpa:
    show-sql: true
  liquibase:
    contexts: dev

logging:
  level:
    org.hibernate.SQL: debug
    com.e4u.lesson_service: debug

---
# ===========================================
# Docker profile
# ===========================================
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://postgres:5432/e4u_lesson
    username: ${DB_USERNAME:nam}
    password: ${DB_PASSWORD:nam123}
  data:
    redis:
      host: redis
      port: 6379
  liquibase:
    contexts: docker

eureka:
  client:
    service-url:
      defaultZone: http://discovery-service:9999/eureka

api:
  server:
    url: http://gateway-service:8080/lesson

---
# ===========================================
# Production profile
# ===========================================
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME:e4u_lesson}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    show-sql: false
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
  liquibase:
    contexts: prod

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL}

logging:
  level:
    root: warn
    org.springframework: warn
    com.e4u.lesson_service: info
