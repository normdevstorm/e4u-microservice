version: '3.8'

services:
  # ===========================================
  # INFRASTRUCTURE SERVICES
  # ===========================================
  
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: rental-postgres
    environment:
      POSTGRES_USER: nam
      POSTGRES_PASSWORD: nam123
      POSTGRES_MULTIPLE_DATABASES: rental_auth,rental_account,rental_item,rental_statistic,rental_payment,rental_curriculum,rental_lesson
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-multiple-databases.sh:/docker-entrypoint-initdb.d/init-multiple-databases.sh
    ports:
      - "5432:5432"
    networks:
      - rental-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nam"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache (for curriculum-service and lesson-service)
  redis:
    image: redis:7-alpine
    container_name: rental-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - rental-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # SPRING CLOUD INFRASTRUCTURE
  # ===========================================
  
  # Config Service - Must start first
  config-service:
    build:
      context: .
      dockerfile: configservice/Dockerfile
    container_name: rental-config-service
    ports:
      - "8888:8888"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - rental-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Discovery Service (Eureka) - Depends on Config
  discovery-service:
    build:
      context: .
      dockerfile: discoveryservice/Dockerfile
    container_name: rental-discovery-service
    ports:
      - "9999:9999"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - CONFIG_SERVER_URL=http://config-service:8888
    depends_on:
      config-service:
        condition: service_healthy
    networks:
      - rental-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9999/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Gateway Service - Entry point for all requests
  gateway-service:
    build:
      context: .
      dockerfile: gatewayservice/Dockerfile
    container_name: rental-gateway-service
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - CONFIG_SERVER_URL=http://config-service:8888
    depends_on:
      config-service:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    networks:
      - rental-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ===========================================
  # BUSINESS MICROSERVICES
  # ===========================================
  
  # Authentication Service
  authentication-service:
    build:
      context: .
      dockerfile: authenticationservice/Dockerfile
    container_name: rental-authentication-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - CONFIG_SERVER_URL=http://config-service:8888
      # Optional: Override secrets via env vars instead of config files
      # - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      # - DB_PASSWORD=${DB_PASSWORD}
    depends_on:
      config-service:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - rental-network

  # Account Service
  account-service:
    build:
      context: .
      dockerfile: accountservice/Dockerfile
    container_name: rental-account-service
    ports:
      - "9081:9081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - CONFIG_SERVER_URL=http://config-service:8888
    depends_on:
      config-service:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - rental-network

  # Item Service
  item-service:
    build:
      context: .
      dockerfile: itemservice/Dockerfile
    container_name: rental-item-service
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - CONFIG_SERVER_URL=http://config-service:8888
    depends_on:
      config-service:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - rental-network

  # Statistic Service
  statistic-service:
    build:
      context: .
      dockerfile: statisticservice/Dockerfile
    container_name: rental-statistic-service
    ports:
      - "9082:9082"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - CONFIG_SERVER_URL=http://config-service:8888
    depends_on:
      config-service:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - rental-network

  # Notification Service
  notification-service:
    build:
      context: .
      dockerfile: notificationservice/Dockerfile
    container_name: rental-notification-service
    ports:
      - "9083:9083"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - CONFIG_SERVER_URL=http://config-service:8888
      # Optional: Override mail credentials
      # - MAIL_USERNAME=${MAIL_USERNAME}
      # - MAIL_PASSWORD=${MAIL_PASSWORD}
    depends_on:
      config-service:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    networks:
      - rental-network

  # Payment Service
  payment-service:
    build:
      context: .
      dockerfile: paymentservice/Dockerfile
    container_name: rental-payment-service
    ports:
      - "8084:8084"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - CONFIG_SERVER_URL=http://config-service:8888
      # Optional: Override PayPal credentials
      # - PAYPAL_CLIENT_ID=${PAYPAL_CLIENT_ID}
      # - PAYPAL_CLIENT_SECRET=${PAYPAL_CLIENT_SECRET}
    depends_on:
      config-service:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - rental-network

  # Curriculum Service
  curriculum-service:
    build:
      context: .
      dockerfile: curriculum-service/Dockerfile
    container_name: rental-curriculum-service
    ports:
      - "8085:8085"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - CONFIG_SERVER_URL=http://config-service:8888
    depends_on:
      config-service:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - rental-network

  # Lesson Service
  lesson-service:
    build:
      context: .
      dockerfile: lesson-service/Dockerfile
    container_name: rental-lesson-service
    ports:
      - "8086:8086"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - CONFIG_SERVER_URL=http://config-service:8888
    depends_on:
      config-service:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - rental-network

  # ===========================================
  # MONITORING & ADMIN
  # ===========================================
  
  # Spring Boot Admin
  monitor-admin:
    build:
      context: .
      dockerfile: monitoradmin/Dockerfile
    container_name: rental-monitor-admin
    ports:
      - "9000:9000"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - CONFIG_SERVER_URL=http://config-service:8888
    depends_on:
      config-service:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    networks:
      - rental-network

# ===========================================
# NETWORKS & VOLUMES
# ===========================================

networks:
  rental-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
